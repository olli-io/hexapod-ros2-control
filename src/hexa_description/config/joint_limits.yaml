# Per-joint-type limits for the hexapod.
#
# All 18 joints (6 legs x {coxa, femur, tibia}) share the limits of their type.
# Loaded by hexapod.urdf.xacro via xacro.load_yaml so this file is the single
# source of truth (CLAUDE.md: hexa_description owns joint limits).
#
# Units: radians (lower, upper), Nm (effort), rad/s (velocity).
# Tune to match the real servo specs once known.

coxa:
  lower: -1.047   # -60 deg, hip swing fore/aft
  upper:  1.047   #  60 deg
  effort: 5.0
  velocity: 5.0

femur:
  lower: -1.047   # -60 deg, shoulder lift
  upper:  1.047
  effort: 5.0
  velocity: 5.0

tibia:
  lower: -1.571   # -90 deg, knee bend
  upper:  1.571
  effort: 5.0
  velocity: 5.0
