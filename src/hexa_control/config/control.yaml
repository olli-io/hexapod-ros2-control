# hexa_control wire values. See src/hexa_control/README.md for node
# behaviour and the rationale behind these knobs.

default_gait: "tripod"

# Seconds for the body to ramp from rest to the active gait's
# linear_max (equivalently, from linear_max to rest, or half a full
# reversal). Lower = snappier response, more chance of stance-foot
# slip during reversals; higher = softer, more sluggish.
vmax_ramp_time_linear: 0.8 # s

# Seconds for yaw to ramp from rest to angular_max.
vmax_ramp_time_angular: 1 # s

# Sub-tick float dribble at the end of a ramp gets snapped to zero so
# the gait engine sees an exact zero crossing (cmd_zero_tol in
# hexa_gait/config/gait.yaml).
snap_tol_linear: 1e-4 # m/s
snap_tol_angular: 1e-4 # rad/s
