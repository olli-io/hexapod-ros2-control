# hexa_control wire values.
#
# control_node clamps /cmd_vel against the caps in hexa_gait/config/gait.yaml,
# runs a first-order body-velocity filter (BodyVelocityLimiter), and
# republishes on /gait/params at 50 Hz. /cmd_gait selects the active
# gait (validated against tripod/ripple/wave).
#
# Tau values are time constants for the post-envelope filter — chosen
# over a fixed accel cap because a single response time generalises
# across gaits (tripod and wave have ~3× different cycle times) and
# composes cleanly with the engagement smoothstep.

default_gait: "tripod"
tau_linear: 0.25    # s — first-order time constant on (v_x, v_y)
tau_angular: 0.40   # s — first-order time constant on omega_z

# Snap-to-target thresholds. The exponential filter only approaches the
# target asymptotically, so a release-from-walking would otherwise leave
# a tail well above the gait engine's cmd_zero_tol (1e-4) for over a
# second. During that tail GAIT keeps re-evaluating with a shrinking
# stride and swing legs drift toward nominal before STOPPING ever fires.
# Snapping kills only the bottom of the tail; decel above the threshold
# stays smooth.
snap_tol_linear: 1.0e-3   # m/s
snap_tol_angular: 1.0e-3  # rad/s
