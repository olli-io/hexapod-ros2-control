# hexa_control wire values — canonical source of truth.
#
# control_node publishes these (alongside the clamped /cmd_vel) on
# /gait/params at 50 Hz. The gait engine has its own fallback YAML at
# hexa_gait/config/gait.yaml, but the values on the wire from this node
# win in normal operation. Keep cycle_time / duty_factor / step_height
# aligned with hexa_gait/config/gait.yaml so the engine cold-start matches
# the steady-state command.
#
# Linear caps match hexa_teleop's gait scaling: anything above these is
# either teleop misconfiguration or noise. v1 is a thin pass-through —
# no deadband (teleop handles it), no accel limits, no gait selection.
#
# Units: linear m/s, angular rad/s, time s, length m.

gait_name: "tripod"
cycle_time: 1.2
duty_factor: 0.5
step_height: 0.035

linear_x_max: 0.30
linear_y_max: 0.20
angular_z_max: 1.00
