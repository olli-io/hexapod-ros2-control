# hexa_control wire values.
#
# control_node clamps incoming /cmd_vel to the velocity caps loaded at
# startup from hexa_gait/config/gait.yaml (via hexa_gait.load_velocity_caps)
# and republishes the result on /gait/params at 50 Hz. v1 ships a single
# gait, so gait_name is hard-coded here.
#
# The walk-cycle knobs (cycle_time, duty_factor, step_height, stride_length)
# also live in hexa_gait/config/gait.yaml — control no longer owns them.
# cycle_time is derived inside the engine each tick from the commanded
# velocity, configured stride_length, and duty_factor.
#
# v1 is a thin pass-through — no deadband (teleop handles it), no accel
# limits, no gait selection.

gait_name: "tripod"
