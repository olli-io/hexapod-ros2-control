# hexa_gait engine knobs — sole source of truth.
#
# The engine reads every walk-cycle parameter here at startup. None of
# them are on the wire any more: hexa_control publishes only velocity
# (linear_x / linear_y / angular_z) on /gait/params, and the engine
# derives the appropriate cycle_time per tick from velocity and the
# values below.
#
# Velocity → cycle_time relationship (computed each tick in the engine):
#
#   v_max_leg = max( |v_leg| for all 6 legs )
#                  where v_leg combines linear_xy with omega_z × r_leg
#   cycle_time = clip( stride_length / (v_max_leg × duty_factor),
#                      min_cycle_time, max_cycle_time )
#
# Stride magnitude per leg is then v_leg × cycle_time × duty_factor,
# bounded at stride_length so saturated commands never exceed the
# joint-limit-safe footprint defined by stride_length.
#
# Implied per-leg velocity ceiling: stride_length / (min_cycle_time ×
# duty_factor). Beyond that, the gait saturates: cycle_time stays at
# min_cycle_time and the per-leg stride magnitude is capped at
# stride_length. Below the v that implies max_cycle_time, cycle_time
# stays at max_cycle_time and stride shrinks linearly with v.
#
# Units: m, s, rad.

# Design per-leg stride magnitude (m). The maximum body-frame displacement
# a foot covers between AEP and PEP in one stance. Tuned to give joint-
# limit margin: lower stride_length → tighter joint use, more headroom
# against geometry.yaml limits, but slower v_max.
stride_length: 0.10

# Fastest cycle. The gait's authoritative speed ceiling: at this value
# the per-leg stride magnitude equals stride_length, and any further
# velocity increase is absorbed by the stride clamp.
min_cycle_time: 0.6

# Slowest cycle. Below the v this implies, cycle_time stops growing and
# stride shrinks instead — keeps slow walking visually brisk.
max_cycle_time: 2.0

duty_factor: 0.5
step_height: 0.035
swing_width: 0.0
controller_dt: 0.02
cmd_zero_tol: 1e-4
recenter_swing_time: 0.2

# Hold time between FORCE_TOUCHDOWN and RECENTER (s). After every
# airborne leg lands at nominal, the controller holds all six feet
# still for this long before the RECENTER ladder starts sweeping the
# originally-grounded legs. Gives the chassis a beat to stop rocking
# from touchdown so the next sweep does not pile motion on residual
# wobble. Set to 0.0 to disable. Skipped entirely when no leg was
# airborne (FORCE_TOUCHDOWN itself is skipped, nothing to settle from).
touchdown_settle_time: 0.2

# Debounce on cmd_vel → 0 before the engine commits to the stop
# transition. Without this, the brief zero crossing the joystick produces
# when it swings through center triggers FORCE_TOUCHDOWN on every yaw
# reversal. While the window counts down the engine keeps ticking the
# active state (GAIT or ENGAGING) at zero stride — legs lift in place —
# so a stick that re-engages before it expires picks the gait back up
# without any reset sequence.
forced_touchdown_delay: 0.8

# Maximum body yaw rate (rad/s). Explicit knob rather than
# geometry-derived: the implicit ceiling from the gait is
# v_max / r_outer ≈ 3.96 rad/s for current values, so this cap leaves
# plenty of headroom and trades reach for predictable feel.
# Loaded by hexa_gait.limits.load_velocity_caps and consumed by both
# hexa_teleop (stick scaling) and hexa_control (/cmd_vel clamp).
angular_z_max: 3.00

# Cold-start (INITIALIZE) ladder. Runs once at engine startup to bridge
# the folded initial_pose (legs tucked above body, chassis on its belly)
# to the standing pose:
#   PLACE_FEET  — three sequential mirroring pairs swing one at a time
#                 from the folded foot position onto the standing
#                 footprint at ground level. Pair order is fixed in
#                 initialize.py (middle pair, then each diagonal) to
#                 keep the body's CoM near centre.
#   LIFT_BODY   — all six feet stay at standing XY; body-frame z ramps
#                 via smoothstep from -coxa_to_bottom to nominal.z
#                 (world frame: feet pressed down, body lifts).
# The ladder is non-preemptible — cmd_vel arriving mid-sequence is held
# until the engine transitions to STAND, mirroring STOPPING's
# commit-to-completion contract.
initialize:
  # Seconds per mirroring pair during PLACE_FEET. Three pairs ⇒ total
  # PLACE_FEET ≈ 3 * pair_swing_time.
  pair_swing_time: 0.8
  # Seconds for the LIFT_BODY z-ramp.
  lift_body_time: 0.6
  # Swing-arc clearance (m) added above each leg's apex during
  # PLACE_FEET. Small because the folded foot already sits well above
  # the ground.
  swing_clearance: 0.04
  # Body-frame offset (m) from the floor (with body on belly) of the
  # IK target at the end of each PLACE_FEET swing. Must clear the foot
  # collision sphere, not just the IK target: the URDF puts the IK
  # target at the bottom of the foot sphere only when the tibia is
  # vertical (see hexapod.urdf.xacro foot link comment). At the
  # PLACE_FEET endpose the tibia is partially folded (~50° below
  # horizontal for the current standing footprint), so the sphere
  # bottom sits up to ~foot_radius below the IK target. A value below
  # ~foot_radius lets the sphere penetrate the floor and Gazebo
  # contact resolution lifts the chassis off its belly before
  # LIFT_BODY starts. ~foot_radius (geometry.yaml foot.radius = 0.01)
  # leaves a small real-clearance margin.
  place_feet_clearance: 0.012
