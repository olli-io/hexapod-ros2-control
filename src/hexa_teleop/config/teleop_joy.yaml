# Joystick teleop config — 8BitDo Pro 2 in X-input mode.
#
# Axis / button indices match sensor_msgs/Joy as published by joy_node
# on Linux (xpad driver). Joy convention: stick pushed forward / left
# is positive, matching the REP-103 body frame (+x forward, +y left)
# so mapping is unit-gain.
#
# Press Start + X while powering the controller on to enter X-input
# mode.

initial_mode: posture # "posture" (default, safe) or "gait"

deadband: 0.1 # absolute stick magnitude below this is treated as zero

# 8BitDo Pro 2 / Xbox-style axis indices in joy_node Joy.axes
axis:
  left_x: 0
  left_y: 1
  right_x: 3
  right_y: 4

# Button index that toggles posture <-> gait on rising edge.
# 0=A, 1=B, 2=X, 3=Y on 8BitDo Pro 2 in X-input mode.
mode_toggle_button: 3 # Y

# Button that toggles FOLDED ↔ STAND on rising edge AND snaps the
# posture height back to zero when the chassis is currently lifted /
# lowered. Press semantics:
#
#   * height != 0 (chassis lifted by D-pad): first press snaps
#     posture.height to zero and triggers the gait engine's reseat
#     ladder; does NOT publish /gait/initialize.
#   * height == 0 in STAND: press folds (STAND → FOLDING → FOLDED) via
#     /gait/initialize as before.
#   * height == 0 in FOLDED: press initializes (FOLDED → INITIALIZE →
#     STAND) via /gait/initialize as before.
#
# So a "lifted-then-fold" sequence is two presses: first snaps the
# height (no fold yet), second folds. Presses in any other engine state
# are no-ops, so repeat presses mid-walk are harmless. 7 = Start on
# 8BitDo Pro 2 / Xbox-style controllers in X-input mode.
init_button: 7 # Start

# D-pad Y axis on Xbox-style controllers in X-input mode. joy_node
# reports the D-pad as analog axes, with the up direction reading
# +1.0 on this build (dpad_up_sign=+1.0). Pressing up integrates
# posture.height positive (body lifts), pressing down integrates
# negative (body drops). The axis is read only in POSTURE mode; in
# GAIT mode the D-pad is inert (the lifted height bleeds through
# unchanged via /body/pose.z so the robot walks at the lifted
# posture).
axis_dpad_y: 7
dpad_up_sign: 1.0

# Shoulder buttons that yaw the body in posture mode. L1 yaws left
# (+yaw about body +z), R1 yaws right (-yaw). Holding past the easing
# time constant saturates at posture.yaw_max_deg. Both buttons cancel
# to zero. Inactive in gait mode (use left stick X for walking yaw).
yaw_left_button: 4 # L1 (LB)
yaw_right_button: 5 # R1 (RB)

# Triggers that drive the "wiggle" gesture in posture mode: same yaw
# as L1/R1 (shared target — L1+L2 does not double up) plus a body
# translation that keeps a fixed point posture.wiggle_pivot_forward_m
# in front of body centre stationary, so the rear of the hexapod
# swings while the front holds. On 8BitDo Pro 2 / Xbox-style pads in
# X-input mode the triggers are analog axes (rest = +1.0, fully
# pressed = -1.0). Treated as binary on/off here: pressed iff the
# trigger reads below wiggle_trigger_threshold.
wiggle_left_trigger_axis: 2 # LT (L2)
wiggle_right_trigger_axis: 5 # RT (R2)
wiggle_trigger_threshold: 0.5 # axis value below this counts as pressed

# Gait-mode stick scaling is loaded at startup from
# hexa_gait/config/gait.yaml via hexa_gait.limits.load_velocity_caps:
#   * full-stick translation maps to ±linear_max (isotropic for x and y),
#     derived from stride_length / (min_cycle_time * duty_factor)
#   * full-stick yaw maps to ±angular_z_max (explicit rad/s knob)
# No knobs for those here on purpose — gait.yaml is the single source.

# Posture mode: right stick -> body translation (x,y) in body frame;
# left stick -> body tilt toward the stick direction (stick forward
# pitches the body forward / front dips; stick left rolls the body
# left / left side dips); L1/R1 -> body yaw about +z.
posture:
  x_max: 0.035 # m (forward)
  y_max: 0.035 # m (left)
  roll_max_deg: 12.0 # deg, converted to rad on load
  pitch_max_deg: 12.0 # deg, converted to rad on load
  yaw_max_deg: 20.0 # deg, button-driven saturation about +z
  # First-order low-pass time constant for the L1/R1 yaw input AND for
  # the L2/R2 wiggle amount. Smaller = snappier (and harsher on the
  # body), larger = mushier. At 0.10s the offset reaches ~63% of
  # yaw_max one tau after a press and is practically saturated within
  # 0.5s.
  yaw_tau_s: 0.10
  # Wiggle pivot — distance forward (+x) of body centre. Yaw amplitude
  # is shared with yaw_max_deg above, so peak side translation at full
  # wiggle is pivot_forward_m * sin(yaw_max_deg). At the defaults
  # (0.06 m, 20°) that's ~21 mm sideways and ~3.6 mm forward bob.
  wiggle_pivot_forward_m: 0.06

  # D-pad-driven body-height offset. Integrated while the D-pad is held
  # in POSTURE mode, clamped to [min_m, max_m], and emitted on
  # /body/pose.z. Unlike every other posture axis this value PERSISTS
  # when the D-pad is released and across a mode toggle into GAIT, so
  # the robot keeps walking at the lifted/lowered posture. The Start
  # button snaps it back to zero (which also triggers the gait
  # engine's reseat ladder to restore default joint geometry at the
  # new body height).
  height:
    max_m: 0.04 # upper bound on the lift (body up)
    min_m: -0.04 # lower bound on the drop (body down)
    rate_m_per_s: 0.05 # integration speed while D-pad held
