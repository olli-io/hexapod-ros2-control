# Joystick teleop config — X-input controller (Xbox, 8BitDo, etc.).
#
# Each section enumerates a controller's physical keys and binds each
# one to a *function name* (or "" for unbound). The function namespace
# is fixed in code (see joy_mapping.ALL_FUNCTIONS); the loader rejects
# unknown names. Controller hardware identity (button/axis indices,
# sign conventions, trigger threshold) lives in ``base`` only — swap
# controllers by editing that block.

initial_mode: gait              # "gait" | "posture" | "animation"
gait_cycle: [ripple, crawl, tetrapod, surf, tripod]  # slowest → fastest
default_gait: tripod
# ANIMATION-mode cycler list comes from hexa_posture/config/posture.yaml
# (``animation_mode_animations``) — single source of truth. Entry into
# ANIMATION snaps to index 0.

base:
  deadband: 0.1                 # stick deadband applied after sign norm
  trigger_threshold: 0.5        # analog triggers used as binary; press = axis < this

  # Linux joystick API indices — sensor_msgs/Joy.buttons[] and Joy.axes[].
  # Edit these two blocks (and ``axis_signs`` below) to support a
  # different controller.
  buttons:
    a: 0
    b: 1
    x: 2
    y: 3
    l1: 4
    r1: 5
    select: 6
    start: 7
  axes:
    left_stick_x: 0
    left_stick_y: 1
    l2: 2                       # analog trigger (rest=+1.0, pressed=-1.0)
    right_stick_x: 3
    right_stick_y: 4
    r2: 5                       # analog trigger
    dpad_x: 6
    dpad_y: 7

  # Per-axis sign so a driver that reports the opposite direction can
  # be normalised. After the sign: stick forward → +1, stick left → +1,
  # dpad-up → +1, dpad-right → +1 (REP-103 body frame). Missing entries
  # default to +1.0.
  axis_signs:
    left_stick_x: -1.0
    left_stick_y: -1.0
    right_stick_x: -1.0
    right_stick_y: -1.0
    dpad_x: -1.0
    dpad_y: -1.0

  # Mode-agnostic bindings. Functions:
  #   gait_mode | posture_mode | animation_mode | init | record
  bindings:
    a: gait_mode
    b: animation_mode
    x: ""
    y: posture_mode
    start: init
    select: record

gait:
  # Functions allowed on button-class keys (l1/r1/l2/r2/dpad_*):
  #   yaw_left | yaw_right | wiggle_left | wiggle_right |
  #   height_up | height_down | gait_prev | gait_next |
  #   animation_prev | animation_next
  # Functions allowed on axis-class keys (sticks):
  #   drive_x | drive_y | drive_yaw | pose_x | pose_y | tilt_roll | tilt_pitch
  bindings:
    l1: ""
    r1: ""
    l2: ""
    r2: ""
    dpad_up: ""
    dpad_down: ""
    dpad_left: gait_prev
    dpad_right: gait_next
    left_stick_x: drive_yaw
    left_stick_y: ""
    right_stick_x: drive_y
    right_stick_y: drive_x

posture:
  bindings:
    l1: yaw_left
    r1: yaw_right
    l2: wiggle_left
    r2: wiggle_right
    dpad_up: height_up
    dpad_down: height_down
    dpad_left: gait_prev
    dpad_right: gait_next
    left_stick_x: tilt_roll
    left_stick_y: tilt_pitch
    right_stick_x: pose_y
    right_stick_y: pose_x

  # Posture-mode scalar limits.
  x_max: 0.035                  # m
  y_max: 0.035                  # m
  roll_max_deg: 12.0
  pitch_max_deg: 12.0
  yaw_max_deg: 20.0
  yaw_tau_s: 0.10               # low-pass for L1/R1 yaw and L2/R2 wiggle
  revert_tau_s: 0.25            # low-pass for Start-button revert
  wiggle_pivot_forward_m: 0.06  # forward pivot point for the wiggle
  height:
    max_m: 0.04
    min_m: -0.04
    rate_m_per_s: 0.05

animation:
  bindings:
    l1: ""
    r1: ""
    l2: ""
    r2: ""
    dpad_up: animation_next
    dpad_down: animation_prev
    dpad_left: ""
    dpad_right: ""
    left_stick_x: drive_yaw
    left_stick_y: ""
    right_stick_x: drive_y
    right_stick_y: drive_x

# Gait-mode stick scaling (linear and angular caps) comes from
# hexa_gait/config/gait.yaml; the teleop node loads it at startup and
# swaps in the active gait's cap whenever /cmd_gait updates.
