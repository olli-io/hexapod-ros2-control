# Joystick teleop config — 8BitDo Pro 2, X-input mode (Start+X at power on).

initial_mode: gait # "gait" or "posture"
deadband: 0.1

# Stick axes (joy_node Joy.axes indices).
axis:
  left_x: 0
  left_y: 1
  right_x: 3
  right_y: 4

# Mode buttons (rising-edge; held = no repeat). 0=A, 1=B, 2=X, 3=Y.
gait_mode_button: 0 # A
posture_mode_button: 3 # Y
animation_mode_button: 1 # B — toggles GAIT ↔ ANIMATION

# Start: fold/init toggle; first press also snaps a lifted height to zero.
init_button: 7 # Start

# Select: in POSTURE, folds current live input into a persistent baseline.
record_button: 6 # Select

# D-pad Y: POSTURE integrates body height; ANIMATION uses D-up/D-down to
# select animation. Sign is -1.0 because the driver reports up as -1.0.
axis_dpad_y: 7
dpad_up_sign: -1.0

# D-pad X: cycles ``gait_cycle``; in ANIMATION, D-left selects
# horizontal_body_roll. Sign is -1.0 because the driver reports right as -1.0.
axis_dpad_x: 6
dpad_right_sign: -1.0

# Slowest → fastest. Must be a subset of hexa_gait's STRATEGIES.
gait_cycle: [wave, ripple, tetrapod, surf, tripod]
default_gait: tripod

# L1/R1: body yaw in POSTURE.
yaw_left_button: 4 # L1 (LB)
yaw_right_button: 5 # R1 (RB)

# L2/R2: "wiggle" gesture (shared yaw + rear-swing translation).
# Triggers are analog axes (rest=+1.0, pressed=-1.0); treated as binary.
wiggle_left_trigger_axis: 2 # LT (L2)
wiggle_right_trigger_axis: 5 # RT (R2)
wiggle_trigger_threshold: 0.5

# Gait-mode stick scaling comes from hexa_gait/config/gait.yaml
# (per-gait linear cap + angular_z_max). No knobs here.

# Posture mode: right stick → translation, left stick → tilt, L1/R1 → yaw.
posture:
  x_max: 0.035 # m
  y_max: 0.035 # m
  roll_max_deg: 12.0
  pitch_max_deg: 12.0
  yaw_max_deg: 20.0
  yaw_tau_s: 0.10 # low-pass for L1/R1 yaw and L2/R2 wiggle amount
  revert_tau_s: 0.25 # low-pass for Start-button revert
  wiggle_pivot_forward_m: 0.06 # forward pivot point for the wiggle

  # D-pad-driven body height. Persists across D-pad release and into GAIT.
  height:
    max_m: 0.04
    min_m: -0.04
    rate_m_per_s: 0.05
