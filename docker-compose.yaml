services:
  dev:
    build:
      context: .
      args:
        USER_UID: "${UID:-1000}"
        USER_GID: "${GID:-1000}"
    image: hexapod-dev:jazzy
    container_name: hexapod-dev
    hostname: hexapod-dev
    network_mode: host
    ipc: host
    stdin_open: true
    tty: true
    working_dir: /workspace
    environment:
      DISPLAY: "${DISPLAY:-:0}"
      QT_X11_NO_MITSHM: "1"
      ROS_DOMAIN_ID: "${ROS_DOMAIN_ID:-42}"
      XDG_RUNTIME_DIR: "/tmp/runtime-dev"
      # gz-transport advertises endpoints by IP. With network_mode: host and a
      # custom container hostname, the hostname doesn't resolve, so processes
      # fail to find each other ("create" loops on "list of world names").
      # Pin to loopback — all gz processes are co-located in this container.
      GZ_IP: "127.0.0.1"
    volumes:
      - .:/workspace
      - /tmp/.X11-unix:/tmp/.X11-unix:rw
      - ${XAUTHORITY:-${HOME}/.Xauthority}:/home/dev/.Xauthority:ro
    # Uncomment when the Pimoroni Servo 2040 is plugged in:
    # devices:
    #   - "/dev/ttyACM0:/dev/ttyACM0"
