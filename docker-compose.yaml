services:
  dev:
    build:
      context: .
      args:
        USER_UID: "${UID:-1000}"
        USER_GID: "${GID:-1000}"
    image: hexa-dev:jazzy
    container_name: hexa-dev
    hostname: hexa-dev
    network_mode: host
    ipc: host
    stdin_open: true
    tty: true
    working_dir: /workspace
    # Supplementary GIDs for the container user. INPUT_GID is the host's
    # `input` group, needed so joy_node can open /dev/input/event* under
    # the joystick passthrough below. Defaults to 992 (Arch / typical
    # Ubuntu); override per-host via env if your distro differs.
    group_add:
      - "${INPUT_GID:-992}"
    environment:
      DISPLAY: "${DISPLAY:-:0}"
      QT_X11_NO_MITSHM: "1"
      ROS_DOMAIN_ID: "${ROS_DOMAIN_ID:-42}"
      XDG_RUNTIME_DIR: "/tmp/runtime-dev"
      # gz-transport advertises endpoints by IP. With network_mode: host and a
      # custom container hostname, the hostname doesn't resolve, so processes
      # fail to find each other ("create" loops on "list of world names").
      # Pin to loopback — all gz processes are co-located in this container.
      GZ_IP: "127.0.0.1"
    volumes:
      - .:/workspace
      - /tmp/.X11-unix:/tmp/.X11-unix:rw
      - ${XAUTHORITY:-${HOME}/.Xauthority}:/home/dev/.Xauthority:ro
      # Joystick passthrough for hexa_teleop (any X-input controller,
      # e.g. Xbox or 8BitDo). Bind mount with rshared propagation so a
      # controller plugged in *after* container start becomes visible
      # inside — Docker's `devices:` snapshots /dev/input at start and
      # misses hot-plug. Pair with device_cgroup_rules below for
      # char-device access; group_add covers filesystem perms.
      - type: bind
        source: /dev/input
        target: /dev/input
        bind:
          propagation: rshared
    # Linux input subsystem (major 13: js*, event*). The bind mount
    # above grants visibility; this grants cgroup permission to read
    # the char devices.
    device_cgroup_rules:
      - 'c 13:* rmw'
    # Uncomment when the Pimoroni Servo 2040 is plugged in:
    # devices:
    #   - "/dev/ttyACM0:/dev/ttyACM0"
